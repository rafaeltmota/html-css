<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixa</title>
    <style>
        h1 {
            background-color: greenyellow;
            height: 300px;
            width: 300px;
             border-width: 10px;
             border-style: solid;
             border-color: green;

             padding-top: 10px;
             padding-right: 10px;
             padding-left: 10px;
             padding-bottom: 10px;

             margin-top: 10px;
             margin-right: 10px;
             margin-bottom: 10px;
             margin-left: 10px;

             outline-width: 5px;
             outline-style: dashed;
             outline-color: pink;
        }
        a {
            border: 4px;
            border-style: solid;
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#"> links são exemplos de caixas inline-level</a>. Vamos ver como isso funciona.</p>
</body>
</html>
