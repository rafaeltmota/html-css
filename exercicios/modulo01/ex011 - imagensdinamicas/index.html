<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplismente aumente e diminua o tomanho do seu navegador.</p>

    <picture>
        <source media="(max-width:700px )" srcset="imagens/foto-p.png">
        <source media="(max-width: 1000px )" srcset="imagens/foto-m.png">
        <img src="imagens/foto-g.png" alt="imagem flexível">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Vamos reproduzir áudio em HTML5</p>
    <audio src="midia/Would-It-Matter-Rose-Campbell.mp3" controls autoplay></audio>
</body>
</html>
